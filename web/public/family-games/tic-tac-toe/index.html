<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    body{font-family:Segoe UI,Tahoma,sans-serif;background:#101827;color:#e5ecf4;margin:0;display:grid;place-items:center;min-height:100vh}
    .card{width:min(92vw,420px);padding:20px;background:#1b2638;border:1px solid #3f526f;border-radius:16px}
    h1{margin:0 0 10px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
    button.cell{height:92px;font-size:40px;border-radius:12px;border:1px solid #476188;background:#142036;color:#fff;cursor:pointer}
    .row{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .action{padding:10px 14px;border-radius:10px;border:1px solid #6d88b0;background:#2a3c5a;color:#fff;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <h1>Tic Tac Toe</h1>
    <div id="status">Turn: X</div>
    <div class="grid" id="grid"></div>
    <div class="row">
      <small>Two-player family mode</small>
      <button class="action" id="reset">Reset</button>
    </div>
  </div>
<script>
const grid = document.getElementById('grid');
const statusEl = document.getElementById('status');
const resetBtn = document.getElementById('reset');
let board = Array(9).fill('');
let turn = 'X';
let done = false;
function winner(b){
  const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(const [a,c,d] of lines){ if(b[a] && b[a]===b[c] && b[a]===b[d]) return b[a]; }
  return '';
}
function render(){
  grid.innerHTML='';
  board.forEach((v,i)=>{
    const btn=document.createElement('button');
    btn.className='cell';
    btn.textContent=v;
    btn.onclick=()=>{
      if(done || board[i]) return;
      board[i]=turn;
      const w=winner(board);
      if(w){ done=true; statusEl.textContent='Winner: '+w; }
      else if(board.every(Boolean)){ done=true; statusEl.textContent='Draw'; }
      else { turn=turn==='X'?'O':'X'; statusEl.textContent='Turn: '+turn; }
      render();
    };
    grid.appendChild(btn);
  });
}
resetBtn.onclick=()=>{ board=Array(9).fill(''); turn='X'; done=false; statusEl.textContent='Turn: X'; render(); };
render();
</script>
</body>
</html>
